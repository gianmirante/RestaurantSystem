<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant.Client</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Restaurant.Client.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    <script>
        // Global variable tracking to cleanly clip playing instances so sounds don't overlap
        let activeNotificationAudioInstance = null;

        window.playSystemNotificationSound = function (filePath, volumeLevel) {
            try {
                if (activeNotificationAudioInstance) {
                    activeNotificationAudioInstance.pause();
                    activeNotificationAudioInstance.currentTime = 0;
                }

                // Create new instance routing to targeted resource clip
                activeNotificationAudioInstance = new Audio(filePath);
                activeNotificationAudioInstance.volume = volumeLevel;
                activeNotificationAudioInstance.play();
            } catch (error) {
                console.error("Browser HTML5 Audio playback block error log:", error);
            }
        };
    </script>
</body>

</html>
